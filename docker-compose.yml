version: "3.9"

services:
  pdf-service:
    build: .
    ports:
      - "8080:8080"
    environment:
      - GIN_MODE=release
    volumes:
      - ./settings.yaml:/app/settings.yaml:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "/app/pdf-service", "--health-check"]
      interval: 30s
      timeout: 10s
      retries: 3
